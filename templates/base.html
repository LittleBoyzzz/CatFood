<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — Cat Food AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFF8F0;
            color: #5D4037;
            display: flex;
            min-height: 100vh
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #F5E6D3 0%, #FAECD8 100%);
            border-right: 1px solid rgba(160,120,90,.12);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            padding: 24px 0;
            z-index: 200;
            display: flex;
            flex-direction: column
        }

        .sidebar .logo {
            padding: 0 24px 28px;
            border-bottom: 1px solid rgba(160,120,90,.12)
        }

        .sidebar .logo h2 {
            font-size: 1.1rem;
            background: linear-gradient(135deg, #A0785A, #C4956A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .sidebar .logo p {
            font-size: .65rem;
            color: #A1887F;
            margin-top: 4px
        }

        .sidebar nav {
            flex: 1;
            padding: 20px 12px
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 10px;
            color: #8D6E63;
            text-decoration: none;
            font-size: .85rem;
            font-weight: 500;
            transition: all .2s
        }

        .sidebar nav a:hover {
            background: rgba(160,120,90,.12);
            color: #4E342E
        }

        .sidebar nav a.active {
            background: linear-gradient(135deg, rgba(196,149,106,.2), rgba(160,120,90,.15));
            color: #4E342E;
            border: 1px solid rgba(196,149,106,.35);
            font-weight: 700
        }

        .sidebar nav a i {
            width: 20px;
            text-align: center;
            font-size: .9rem
        }

        /* ── Main ── */
        .main {
            margin-left: 240px;
            flex: 1;
            padding: 30px;
            min-height: 100vh
        }

        .page-header {
            margin-bottom: 30px
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4E342E
        }

        .page-header p {
            font-size: .8rem;
            color: #A1887F;
            margin-top: 4px
        }

        /* ── Cards ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px
        }

        .card {
            background: #fff;
            border: 1px solid rgba(160,120,90,.1);
            border-radius: 16px;
            padding: 22px;
            transition: transform .2s;
            box-shadow: 0 2px 12px rgba(160,120,90,.06)
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(160,120,90,.12)
        }

        .card .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            margin-bottom: 12px
        }

        .card .label {
            font-size: .7rem;
            color: #A1887F;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .card .value {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #A0785A, #C4956A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 2px
        }

        .card .sub {
            font-size: .65rem;
            color: #A1887F;
            margin-top: 2px
        }

        .icon-blue {
            background: rgba(196,149,106,.15);
            color: #A0785A
        }

        .icon-green {
            background: rgba(129,170,119,.15);
            color: #6B9E5B
        }

        .icon-purple {
            background: rgba(161,136,127,.15);
            color: #8D6E63
        }

        .icon-orange {
            background: rgba(220,170,110,.15);
            color: #D4A46A
        }

        .icon-red {
            background: rgba(200,120,100,.15);
            color: #C87864
        }

        .icon-pink {
            background: rgba(200,140,160,.15);
            color: #C88CA0
        }

        /* ── Section & Box ── */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 28px 0 16px;
            padding-left: 12px;
            border-left: 4px solid #C4956A;
            color: #4E342E
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 18px;
            margin-bottom: 24px
        }

        .box {
            background: #fff;
            border: 1px solid rgba(160,120,90,.1);
            border-radius: 16px;
            padding: 22px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(160,120,90,.06)
        }

        .box h3 {
            font-size: .9rem;
            font-weight: 600;
            color: #4E342E;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .box img {
            width: 100%;
            border-radius: 8px;
            cursor: zoom-in;
            transition: transform 0.2s;
        }

        .box img:hover {
            transform: scale(1.02);
        }

        .box p.desc {
            font-size: .72rem;
            color: #A1887F;
            margin-top: 2px;
            margin-bottom: 10px
        }

        /* ── Table ── */
        table.data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(160,120,90,.1);
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(160,120,90,.06)
        }

        table.data-table th {
            background: rgba(196,149,106,.08);
            padding: 12px 16px;
            text-align: left;
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8D6E63;
            font-weight: 600
        }

        table.data-table td {
            padding: 12px 16px;
            border-top: 1px solid rgba(160,120,90,.06);
            font-size: .85rem;
            color: #5D4037
        }

        .badge-best {
            background: linear-gradient(135deg, #6B9E5B, #81AA77);
            color: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: .65rem;
            font-weight: 700;
            margin-left: 6px
        }

        /* ── Persona Card ── */
        .persona-card {
            background: #fff;
            border: 1px solid rgba(160,120,90,.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(160,120,90,.06)
        }

        .persona-card h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #4E342E;
            margin-bottom: 8px
        }

        .persona-card .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: .7rem;
            font-weight: 600;
            margin-right: 6px;
            margin-bottom: 4px
        }

        .persona-card .detail {
            font-size: .8rem;
            color: #8D6E63;
            line-height: 1.8
        }

        .tag-0 {
            background: rgba(196,149,106,.2);
            color: #A0785A
        }

        .tag-1 {
            background: rgba(129,170,119,.2);
            color: #6B9E5B
        }

        .tag-2 {
            background: rgba(200,140,100,.2);
            color: #C88C64
        }

        .bar {
            height: 5px;
            background: rgba(160,120,90,.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 4px 0
        }

        .bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #C4956A, #A0785A);
            border-radius: 3px
        }

        .mini-chart {
            height: 200px
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #BCAAA4;
            font-size: .7rem;
            border-top: 1px solid rgba(160,120,90,.08);
            margin-top: 30px
        }

        /* ── Modal Lightbox ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(62, 39, 35, 0.85);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 8px;
            cursor: grab;
            transform-origin: center center;
        }

        .modal-content:active {
            cursor: grabbing;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #FAECD8;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }

        .close-modal:hover {
            color: #fff;
        }

        /* ── Hero Banner ── */
        .hero {
            position: relative; border-radius: 24px; overflow: hidden;
            padding: 56px 48px; margin-bottom: 32px;
            background: linear-gradient(135deg, #A0785A, #C4956A, #D4A574);
            background-size: 300% 300%;
            animation: gradientShift 8s ease infinite;
            box-shadow: 0 20px 60px rgba(160,120,90,0.25);
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hero-orb {
            position: absolute; border-radius: 50%; filter: blur(60px);
            opacity: 0.3; animation: floatOrb 6s ease-in-out infinite;
        }
        .hero-orb.o1 { width:260px;height:260px;background:#FAECD8;top:-80px;right:-60px;animation-delay:0s; }
        .hero-orb.o2 { width:180px;height:180px;background:#E8C9A8;bottom:-40px;left:30%;animation-delay:-2s; }
        .hero-orb.o3 { width:140px;height:140px;background:#DEB896;top:20px;left:-40px;animation-delay:-4s; }
        @keyframes floatOrb {
            0%,100% { transform: translateY(0) scale(1); }
            50%     { transform: translateY(-18px) scale(1.08); }
        }
        .hero::before {
            content:''; position:absolute; inset:0;
            background-image: linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),
                              linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);
            background-size: 40px 40px;
        }
        #heroCanvas { position:absolute; inset:0; pointer-events:none; }
        .hero-content { position:relative; z-index:10; }
        .hero-badge {
            display:inline-flex; align-items:center; gap:8px;
            background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.35);
            border-radius:50px; padding:6px 16px; font-size:.72rem; color:#fff;
            letter-spacing:1px; text-transform:uppercase; margin-bottom:20px;
            backdrop-filter:blur(8px);
        }
        .hero-badge .dot {
            width:7px; height:7px; border-radius:50%; background:#fff;
            box-shadow:0 0 8px rgba(255,255,255,.8); animation:pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100%{ opacity:1; transform:scale(1); }
            50%    { opacity:.5; transform:scale(1.4); }
        }
        .hero h1 {
            font-size:2.6rem; font-weight:800; line-height:1.2;
            color:#fff; margin-bottom:14px; letter-spacing:-.5px;
        }
        .hero h1 span {
            background:linear-gradient(135deg,#FAECD8,#FFF5EB,#FFF);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-size:200%; animation:shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0%  { background-position:0% center; }
            100%{ background-position:200% center; }
        }
        .hero p.tagline {
            font-size:1rem; color:rgba(255,255,255,.75);
            max-width:560px; line-height:1.7; margin-bottom:28px;
        }
        .hero-stats { display:flex; gap:12px; flex-wrap:wrap; }
        .hero-stat {
            background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25);
            border-radius:12px; padding:10px 18px; backdrop-filter:blur(10px);
            display:flex; align-items:center; gap:10px; transition:all .3s;
        }
        .hero-stat:hover {
            background:rgba(255,255,255,.25); border-color:rgba(255,255,255,.4);
            transform:translateY(-2px);
        }
        .hero-stat .hs-icon { font-size:1.1rem; }
        .hero-stat .hs-val { font-size:1.3rem; font-weight:800; color:#fff; line-height:1; }
        .hero-stat .hs-lbl {
            font-size:.65rem; color:rgba(255,255,255,.6);
            text-transform:uppercase; letter-spacing:.8px; margin-top:2px;
        }
        .count-up { display:inline-block; }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <h2><i class="fas fa-cat"></i> Cat Food AI</h2>
            <p>Packaging Survey Dashboard</p>
        </div>
        <nav>
            <a href="/" class="{{ 'active' if request.endpoint == 'home' }}"><i class="fas fa-home"></i> หน้าหลัก</a>
            <a href="/unsupervised" class="{{ 'active' if request.endpoint == 'unsupervised' }}"><i
                    class="fas fa-project-diagram"></i> Unsupervised</a>
            <a href="/supervised" class="{{ 'active' if request.endpoint == 'supervised' }}"><i
                    class="fas fa-brain"></i> Supervised</a>
            <a href="/business" class="{{ 'active' if request.endpoint == 'business' }}"><i
                    class="fas fa-chart-pie"></i> Business Insight</a>
        </nav>
    </aside>

    <main class="main">
        {% block content %}{% endblock %}
        <footer>
            <p>Cat Food Packaging Survey &copy; 2024 | Database: SQLite | ML: scikit-learn</p>
        </footer>
    </main>

    <!-- The Modal for Image Zoom -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <div style="width:100%; height:100%; overflow:hidden; position:relative;" id="modalContainer">
            <img class="modal-content" id="modalImage">
        </div>
    </div>

    <script>
        Chart.defaults.color = '#8D6E63';
        Chart.defaults.borderColor = 'rgba(160,120,90,0.08)';
        Chart.defaults.font.family = 'Inter';

        // Image Zoom Modal Logic
        document.addEventListener("DOMContentLoaded", function () {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("modalImage");
            const closeBtn = document.querySelector(".close-modal");

            modalImg.ondragstart = function () { return false; };

            let scale = 1;
            let isDragging = false;
            let translateX = 0, translateY = 0;
            let startX, startY;

            document.querySelectorAll('.box img').forEach(img => {
                img.onclick = function () {
                    modal.style.display = "flex";
                    modalImg.src = this.src;
                    scale = 1;
                    translateX = 0; translateY = 0;
                    modalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
                }
            });

            const closeModal = () => { modal.style.display = "none"; }
            closeBtn.onclick = closeModal;
            modal.onclick = (e) => { if (e.target.id === "modalContainer" || e.target === modal) closeModal(); }

            modalImg.addEventListener('wheel', function (e) {
                e.preventDefault();
                const rect = modalImg.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = Math.min(Math.max(0.5, scale * zoomFactor), 10);
                const ratio = 1 - (newScale / scale);
                translateX += x * ratio;
                translateY += y * ratio;
                scale = newScale;
                modalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }, { passive: false });

            modalImg.addEventListener('mousedown', function (e) {
                e.preventDefault();
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                modalImg.style.cursor = 'grabbing';
            });
            document.addEventListener('mouseup', function () {
                isDragging = false;
                modalImg.style.cursor = 'grab';
            });
            document.addEventListener('mousemove', function (e) {
                if (!isDragging) return;
                e.preventDefault();
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                modalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            });
        });

        /* ── Count-up Animation ── */
        document.querySelectorAll('.count-up').forEach(el => {
            const target   = parseFloat(el.dataset.target) || 0;
            const decimals = parseInt(el.dataset.decimals) || 0;
            const divisor  = parseFloat(el.dataset.divisor) || 1;
            const duration = 1800, start = performance.now();
            function step(now) {
                const p = Math.min((now - start) / duration, 1);
                const e = 1 - Math.pow(1 - p, 3);
                el.textContent = ((target / divisor) * e).toFixed(decimals);
                if (p < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        });

        /* ── Hero Canvas Particles ── */
        (function(){
            const canvas = document.getElementById('heroCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            function resize(){ canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; }
            resize(); window.addEventListener('resize', resize);
            const N = 55;
            const pts = Array.from({length:N}, ()=>({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.6+.4, vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35, a:Math.random()*.5+.15 }));
            function draw(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                pts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0; if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${p.a})`; ctx.fill(); });
                for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){ const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy); if(d<90){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(255,255,255,${.15*(1-d/90)})`;ctx.lineWidth=.6;ctx.stroke();}}
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
